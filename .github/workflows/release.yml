name: Release (manual → GitHub Packages @latest)

# Production release of the host package, ONLY on the manual button. Bumps the
# version in package.json, builds, publishes @latest, and pushes the commit + tag.
# Product repos then repin to the new ^version. Pipeline in _build.yml.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_build.yml
    with:
      publish_tag: latest
      bump: ${{ inputs.bump }}
    secrets: inherit
