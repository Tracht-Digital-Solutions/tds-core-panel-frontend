name: Build (reusable)

# Single source of truth for the host PACKAGE. tds-core-panel-frontend is now a
# published package (the shell + base pages + corePanelBase integration) consumed
# by the product repos (tds-admin-panel / tds-customer-panel), NOT a built app.
# Called by ci.yml (PR gate, no publish), dev.yml (@dev prerelease) and
# release.yml (@latest + tag). NPM_TOKEN = PACKAGE_TOKEN (install contract/shared
# from Packages via the committed .npmrc + publish).

on:
  workflow_call:
    inputs:
      publish_tag:
        description: "none = build only (CI); 'dev' = prerelease @dev; 'latest' = real release."
        required: false
        type: string
        default: none
      bump:
        description: Version bump for a 'latest' release (patch | minor | major).
        required: false
        type: string
        default: patch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NPM_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PACKAGE_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install
        # `npm install --no-package-lock` (not `npm ci`): a Windows-generated
        # lockfile pins only win32 optional binaries and breaks the Linux runner.
        run: npm install --no-package-lock

      - name: Type check
        run: npm run type-check

      - name: Build (tsup → dist/astro.js)
        run: npm run build

      - name: Publish prerelease (@dev)
        if: ${{ inputs.publish_tag == 'dev' }}
        run: |
          base=$(node -p "require('./package.json').version")
          npm version "${base}-dev.${{ github.run_number }}" --no-git-tag-version
          npm publish --tag dev

      - name: Release (@latest) + push tag
        if: ${{ inputs.publish_tag == 'latest' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          new=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          git add package.json
          git commit -m "release: ${new}"
          # Annotated tag so `git push --follow-tags` actually pushes it.
          git tag -a "${new}" -m "release ${new}"
          npm publish
          git push --follow-tags origin HEAD:main

      - name: Prune old prerelease package versions (keep newest 5)
        continue-on-error: true  # best-effort; needs delete:packages on PACKAGE_TOKEN
        if: ${{ inputs.publish_tag != 'none' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: tds-core-panel-frontend
          package-type: npm
          min-versions-to-keep: 5
          delete-only-pre-release-versions: 'true'
          token: ${{ secrets.PACKAGE_TOKEN }}
